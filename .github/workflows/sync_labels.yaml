name: ♻️ Sync Labels

on:
  push:
    paths:
      - .github/labels.yml
    branches:
      - main
  workflow_dispatch:

jobs:
  labels:
    name: ♻️ Sync labels
    runs-on: ubuntu-20.04
    steps:
      - name: ⤵️ Check out code from GitHub
        uses: actions/checkout@v7

      - name: 🚀 Run Label Sync
        uses: srealmoreno/label-sync-action@v2
        with:
          config-file: |
            .github/labels.yml
            https://raw.githubusercontent.com/VeryGoodOpenSource/.github/main/.github/labels.yml
